name: Greetings

on: [push, pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
      - run: sudo rm -rf /usr/local /opt/ && sudo mkdir -p /usr/local/{bin,share,lib64}
      - run: sudo apt update && sudo apt install aria2
      - run: sudo -v ; curl https://rclone.org/install.sh | sudo bash -s beta
      - run: mkdir -p ~/.config/rclone && echo -e "$R" > ~/.config/rclone/rclone.conf
        env:
          R: ${{  secrets.R  }}
      - run: aria2c --seed-time=0 -d out "$URL" 
        env:
          URL: ${{  secrets.URL  }}
      - uses: mxschmitt/action-tmate@v3.23
      - run: rclone --progress --multi-thread-streams 0 --buffer-size 64M --transfers 1 copy out/ f:out/    
      - run: rm -rf ~/.config *
