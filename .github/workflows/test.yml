name: Greetings

on: [push, pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
      - run: sudo rm -rf /usr/local /opt/ && sudo mkdir -p /usr/local/{bin,share,lib64}
      - run: sudo apt update && sudo apt install aria2
      - run: wget -c https://downloads.rclone.org/v1.70.0/rclone-v1.70.0-linux-amd64.deb; sudo dpkg -i rclone-v1.70.0-linux-amd64.deb; rm rclone-v1.70.0-linux-amd64.deb 
      - run: mkdir -p ~/.config/rclone && echo -e "$R" > ~/.config/rclone/rclone.conf
        env:
          R: ${{  secrets.R  }}
      - run: aria2c --seed-time=0 -d out "$URL" 
        env:
          URL: ${{  secrets.URL  }}
      - run: rclone --progress  --transfers 16 copy out/ f:out/    
      - run: rm -rf ~/.config *
