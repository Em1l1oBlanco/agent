name: Greetings

on: [push, pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
      - run: sudo rm -rf /usr/local /opt/ && sudo mkdir -p /usr/local/{bin,share,lib64}
      - run: sudo apt update && sudo apt install aria2 rclone
      - run: mkdir -p ~/.config/rclone && echo -e $R > ~/.config/rclone/rclone.conf
        env:
          R: ${{  secrets.R  }}
      - run: aria2c --seed-time=0 -d out "$URL" && rclone -P --transfers=16 copy out f:out
        env:
          URL: ${{  secrets.URL  }}
      - run: rm -rf ~/.config *
